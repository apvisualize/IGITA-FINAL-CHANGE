<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IGITA 2026 — Notification Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020408;
    --bg2: #050812;
    --accent: #0088ff;
    --text: #e8eeff;
    --muted: #6b7fa8;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: radial-gradient(ellipse 100% 60% at 50% 0%, rgba(0,80,180,0.12) 0%, transparent 60%),
                #020810;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 40px 20px;
  }

  .page-title {
    text-align: center;
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .page-title span {
    display: block;
    font-size: 0.8rem;
    margin-top: 4px;
    color: rgba(0,136,255,0.6);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.08em;
  }

  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
  }

  .demo-btn {
    padding: 12px 24px;
    border-radius: 9px;
    border: 1px solid;
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: transform 0.18s ease, filter 0.18s ease;
    position: relative;
    overflow: hidden;
  }

  .demo-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
  .demo-btn:active { transform: scale(0.97); }

  .btn-warning {
    background: linear-gradient(135deg, rgba(245,158,11,0.18), rgba(245,158,11,0.08));
    border-color: rgba(245,158,11,0.4);
    color: #f59e0b;
    box-shadow: 0 0 18px rgba(245,158,11,0.15);
  }
  .btn-error {
    background: linear-gradient(135deg, rgba(239,68,68,0.18), rgba(239,68,68,0.08));
    border-color: rgba(239,68,68,0.4);
    color: #ef4444;
    box-shadow: 0 0 18px rgba(239,68,68,0.15);
  }
  .btn-timeout {
    background: linear-gradient(135deg, rgba(0,212,255,0.18), rgba(0,212,255,0.08));
    border-color: rgba(0,212,255,0.4);
    color: #00d4ff;
    box-shadow: 0 0 18px rgba(0,212,255,0.15);
  }
  .btn-info {
    background: linear-gradient(135deg, rgba(0,136,255,0.18), rgba(0,136,255,0.08));
    border-color: rgba(0,136,255,0.4);
    color: #0088ff;
    box-shadow: 0 0 18px rgba(0,136,255,0.15);
  }

  /* ─────────────────────────────────────────────────────────
     PREMIUM NOTIFICATION MODAL
  ───────────────────────────────────────────────────────── */
  #igita-notif-overlay {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(2, 4, 8, 0);
    backdrop-filter: blur(0px);
    -webkit-backdrop-filter: blur(0px);
    opacity: 0;
    pointer-events: none;
    transition:
      opacity 0.28s cubic-bezier(0.4, 0, 0.2, 1),
      background 0.28s ease,
      backdrop-filter 0.28s ease;
  }
  #igita-notif-overlay.open {
    opacity: 1;
    pointer-events: auto;
    background: rgba(2, 4, 8, 0.78);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .igita-notif-modal {
    position: relative;
    width: min(440px, 100%);
    background: linear-gradient(150deg, #080f1e 0%, #040a14 100%);
    border: 1px solid rgba(0, 136, 255, 0.14);
    border-radius: 18px;
    overflow: hidden;
    transform: scale(0.88) translateY(20px);
    transition: transform 0.36s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.04),
      0 32px 80px rgba(0, 0, 0, 0.65),
      0 8px 24px rgba(0, 0, 0, 0.4);
  }
  #igita-notif-overlay.open .igita-notif-modal {
    transform: scale(1) translateY(0);
  }

  .notif-accent-bar {
    height: 2px;
    width: 100%;
  }

  .notif-bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,136,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,136,255,0.025) 1px, transparent 1px);
    background-size: 38px 38px;
    pointer-events: none;
    z-index: 0;
  }

  .notif-glow-orb {
    position: absolute;
    top: -80px; right: -60px;
    width: 260px; height: 260px;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
    transition: background 0.3s ease;
  }

  .notif-icon-ring,
  .notif-type-label,
  .notif-title-el,
  .notif-message-el,
  .notif-code-wrap,
  .notif-ok-btn { position: relative; z-index: 1; }

  .notif-icon-ring {
    width: 68px; height: 68px;
    border-radius: 50%;
    border: 1.5px solid;
    display: flex; align-items: center; justify-content: center;
    margin: 36px 0 0 32px;
    background: rgba(0, 0, 0, 0.35);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .notif-icon-ring span {
    display: flex; align-items: center; justify-content: center;
    transition: color 0.3s;
  }

  .notif-type-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    font-weight: 700;
    margin: 20px 32px 6px;
    transition: color 0.3s;
  }

  .notif-title-el {
    font-family: 'Syne', sans-serif;
    font-size: 1.35rem;
    font-weight: 800;
    color: #eef2ff;
    line-height: 1.25;
    margin: 0 32px 12px;
  }

  .notif-message-el {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    color: #7c8db5;
    line-height: 1.65;
    margin: 0 32px 24px;
    white-space: pre-line;
  }

  .notif-code-wrap {
    margin: 0 32px 24px;
    padding: 14px 16px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 10px;
    border: 1px solid rgba(0, 136, 255, 0.1);
    display: none;
  }

  .notif-code-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.14em;
    color: #5a6d8a;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .notif-code-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 10px 14px;
    border-radius: 7px;
    border: 1px solid;
    background: rgba(0, 0, 0, 0.25);
    text-align: center;
    transition: color 0.3s, border-color 0.3s, box-shadow 0.3s;
  }

  .notif-ok-btn {
    display: block;
    width: calc(100% - 64px);
    margin: 0 32px 32px;
    padding: 14px 20px;
    border-radius: 10px;
    border: 1px solid;
    font-family: 'Syne', sans-serif;
    font-size: 0.875rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.18s ease, filter 0.18s ease, box-shadow 0.3s ease;
  }
  .notif-ok-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s ease;
  }
  .notif-ok-btn:hover { transform: translateY(-1px); filter: brightness(1.08); }
  .notif-ok-btn:hover::before { background: rgba(255,255,255,0.06); }
  .notif-ok-btn:active { transform: scale(0.98) translateY(0); }
</style>
</head>
<body>

<div class="page-title">
  IGITA 2026 — Notification System
  <span>// Klik tombol untuk preview setiap tipe notifikasi</span>
</div>

<div class="btn-row">
  <button class="demo-btn btn-warning"
    onclick="showNotif({ type: 'warning', title: 'Pendaftaran Ditutup', message: 'Kuota pendaftaran sudah penuh\n\nSilakan hubungi panitia untuk informasi lebih lanjut.' })">
    ⚠ Warning — Kuota Penuh
  </button>

  <button class="demo-btn btn-error"
    onclick="showNotif({ type: 'error', title: 'Pendaftaran Gagal', message: 'Gagal mengirim data ke server.\n\nSilakan coba lagi atau hubungi panitia.' })">
    ✕ Error — Submit Gagal
  </button>

  <button class="demo-btn btn-timeout"
    onclick="showNotif({ type: 'timeout', title: 'Koneksi Lambat', message: 'Respon server melebihi batas waktu. Data kamu kemungkinan sudah masuk ke sistem. Hubungi panitia dengan kode di bawah untuk konfirmasi — jangan submit ulang sebelum dikonfirmasi.', code: 'IGITA-2026-A7KX3Q' })">
    ⏱ Timeout — Dengan Kode
  </button>

  <button class="demo-btn btn-info"
    onclick="showNotif({ type: 'info', title: 'Informasi', message: 'Data kamu sedang diproses oleh sistem.' })">
    i Info — General
  </button>
</div>

<!-- Notification Modal (injected by showNotif) -->
<div id="igita-notif-overlay" aria-hidden="true">
  <div class="igita-notif-modal" id="igita-notif-modal">
    <div class="notif-accent-bar"  id="notif-accent-bar"></div>
    <div class="notif-bg-grid"></div>
    <div class="notif-glow-orb"   id="notif-glow-orb"></div>
    <div class="notif-icon-ring"  id="notif-icon-ring">
      <span id="notif-icon-inner"></span>
    </div>
    <div class="notif-type-label" id="notif-type-label"></div>
    <div class="notif-title-el"   id="notif-title-el"></div>
    <div class="notif-message-el" id="notif-message-el"></div>
    <div class="notif-code-wrap"  id="notif-code-wrap">
      <div class="notif-code-label">// Kode Registrasi — Simpan dan hubungi panitia</div>
      <div class="notif-code-val" id="notif-code-val"></div>
    </div>
    <button class="notif-ok-btn" id="notif-ok-btn">OK</button>
  </div>
</div>

<script>
function showNotif({ type = 'info', title, message, code = null, onClose = null } = {}) {
  const CONFIGS = {
    warning: {
      color : '#f59e0b',
      glow  : 'rgba(245,158,11,0.22)',
      border: 'rgba(245,158,11,0.35)',
      label : '// PERINGATAN',
      icon  : `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    },
    error: {
      color : '#ef4444',
      glow  : 'rgba(239,68,68,0.22)',
      border: 'rgba(239,68,68,0.35)',
      label : '// ERROR',
      icon  : `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
    },
    timeout: {
      color : '#00d4ff',
      glow  : 'rgba(0,212,255,0.22)',
      border: 'rgba(0,212,255,0.35)',
      label : '// PERHATIAN',
      icon  : `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
    },
    info: {
      color : '#00d4ff',
      glow  : 'rgba(0,212,255,0.22)',
      border: 'rgba(0,212,255,0.35)',
      label : '// INFO',
      icon  : `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    },
  };
  const cfg = CONFIGS[type] || CONFIGS.info;

  const overlay   = document.getElementById('igita-notif-overlay');
  const accentBar = document.getElementById('notif-accent-bar');
  const glowOrb   = document.getElementById('notif-glow-orb');
  const iconRing  = document.getElementById('notif-icon-ring');
  const iconInner = document.getElementById('notif-icon-inner');
  const typeLabel = document.getElementById('notif-type-label');
  const titleEl   = document.getElementById('notif-title-el');
  const msgEl     = document.getElementById('notif-message-el');
  const codeWrap  = document.getElementById('notif-code-wrap');
  const codeVal   = document.getElementById('notif-code-val');
  const okBtn     = document.getElementById('notif-ok-btn');

  accentBar.style.background = `linear-gradient(90deg, ${cfg.color} 0%, transparent 80%)`;
  glowOrb.style.background   = `radial-gradient(circle, ${cfg.glow} 0%, transparent 70%)`;
  iconRing.style.borderColor = cfg.border;
  iconRing.style.boxShadow   = `0 0 24px ${cfg.glow}, inset 0 0 14px ${cfg.glow}`;
  iconInner.style.color      = cfg.color;
  iconInner.innerHTML        = cfg.icon;
  typeLabel.textContent      = cfg.label;
  typeLabel.style.color      = cfg.color;
  titleEl.textContent        = title || '';
  msgEl.textContent          = message || '';
  okBtn.style.background     = `linear-gradient(135deg, ${cfg.glow}, rgba(0,0,0,0.2))`;
  okBtn.style.borderColor    = cfg.border;
  okBtn.style.boxShadow      = `0 0 18px ${cfg.glow}, inset 0 1px 0 rgba(255,255,255,0.06)`;
  okBtn.style.color          = cfg.color;

  if (code) {
    codeWrap.style.display = 'block';
    codeVal.textContent    = code;
    codeVal.style.color    = cfg.color;
    codeVal.style.borderColor = cfg.border;
    codeVal.style.boxShadow   = `0 0 10px ${cfg.glow}`;
  } else {
    codeWrap.style.display = 'none';
  }

  okBtn.onclick = () => {
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden', 'true');
    if (typeof onClose === 'function') onClose();
  };

  overlay.classList.remove('open');
  void overlay.offsetWidth;
  overlay.setAttribute('aria-hidden', 'false');
  overlay.classList.add('open');
}

// Close on backdrop click
document.getElementById('igita-notif-overlay').addEventListener('click', function(e) {
  if (e.target === this) {
    this.classList.remove('open');
    this.setAttribute('aria-hidden', 'true');
  }
});
</script>
</body>
</html>
